# mkinitcpio.conf - HUNTER OS
# This configuration generates the initial ramdisk for booting

# MODULES
# Add modules that should be loaded before any boot hooks are run
MODULES=(btrfs ext4 vfat)

# BINARIES
# Additional binaries to include in the initramfs
BINARIES=()

# FILES
# Additional files to include in the initramfs
FILES=()

# HOOKS
# The order of hooks is critical for proper boot sequence
# - base: Essential initramfs setup
# - udev: Device manager for hardware detection
# - archiso: Archiso-specific hooks for live environment
# - archiso_loop_mnt: Support for loop-mounted images
# - archiso_pxe_common: Common PXE boot support
# - archiso_pxe_nbd: NBD support for PXE
# - archiso_pxe_http: HTTP support for PXE
# - archiso_pxe_nfs: NFS support for PXE
# - modconf: Load modules from /etc/modprobe.d/
# - kms: Kernel mode setting for early graphics
# - keyboard: Keyboard support for emergency shell
# - keymap: Console keymap
# - block: Block device support
# - filesystems: Filesystem drivers
# - fsck: Filesystem check before mounting
HOOKS=(base udev archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs modconf kms keyboard keymap block filesystems fsck)

# COMPRESSION
# Use zstd for fast decompression during boot
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-3 --long)

# MODULES_DECOMPRESS
# Decompress kernel modules for faster loading
MODULES_DECOMPRESS="yes"
