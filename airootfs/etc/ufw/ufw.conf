# UFW Main Configuration for HUNTER OS
# /etc/ufw/ufw.conf

# Set to yes to start on boot
ENABLED=yes

# Set the default input policy to DROP
DEFAULT_INPUT_POLICY="DROP"

# Set the default output policy to ACCEPT
DEFAULT_OUTPUT_POLICY="ACCEPT"

# Set the default forward policy to DROP
DEFAULT_FORWARD_POLICY="DROP"

# Set the default application policy to SKIP
DEFAULT_APPLICATION_POLICY="SKIP"

# Manage built-in chains
MANAGE_BUILTINS=no

# IPV6 support
IPV6=yes

# Logging level (off, low, medium, high, full)
LOGLEVEL=low
