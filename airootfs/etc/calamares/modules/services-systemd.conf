---
# Calamares - services-systemd module
# Enable/disable services after installation

services:
    - name: "NetworkManager"
      mandatory: true
    - name: "sddm"
      mandatory: true
    - name: "bluetooth"
      mandatory: false
    - name: "apparmor"
      mandatory: true
    - name: "ufw"
      mandatory: true
    - name: "fail2ban"
      mandatory: true

targets:
    - name: "graphical"
      mandatory: true
