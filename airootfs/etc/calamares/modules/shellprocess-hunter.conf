---
# Calamares - shellprocess module for Hunter OS post-install hardening
# Runs after user creation to enforce multi-user isolation

dontChroot: false
timeout: 120

script:
    - command: "chmod 711 /home"
      name: "Set /home traversal-only"
    - command: "rm -f /etc/sudoers.d/hunter"
      name: "Remove live-user NOPASSWD sudo"
    - command: "userdel -r hunter 2>/dev/null || true"
      name: "Remove live user account"
    - command: "mkdir -p /home/Shared && chmod 1770 /home/Shared && chown root:users /home/Shared"
      name: "Create shared directory"
    - command: "chmod 700 /home/*/ 2>/dev/null || true"
      name: "Enforce private home directories"
