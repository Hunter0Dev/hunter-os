# Calamares Settings for HUNTER OS

modules-search: [ local ]

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - initcpio
  - users
  - networkcfg
  - displaymanager
  - packages
  - grubcfg
  - bootloader
  - services-systemd
  - shellprocess@shellprocess-hunter
  - umount
- show:
  - finished

branding: hunter
prompt-install: true
dont-chroot: false
