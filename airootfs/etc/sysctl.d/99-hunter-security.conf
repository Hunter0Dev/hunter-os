# ============================================
# HUNTER OS - Kernel Security Hardening
# ============================================
# /etc/sysctl.d/99-hunter-security.conf

# ============================================
# Network Security
# ============================================

# IP Forwarding (disabled for security)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# SYN Cookies (protection against SYN flood attacks)
net.ipv4.tcp_syncookies = 1

# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Ignore source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Ignore send redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reverse path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log Martian packets (packets with impossible addresses)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP ping requests
net.ipv4.icmp_echo_ignore_all = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# TCP/IP stack hardening
# TCP timestamps: keep enabled for PAWS and RTT estimation (disabling breaks
# performance on high-latency links; fingerprinting risk is minimal)
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_rfc1337 = 1

# ============================================
# Kernel Security
# ============================================

# Restrict kernel pointer exposure
kernel.kptr_restrict = 2

# Restrict dmesg access
kernel.dmesg_restrict = 1

# Restrict access to kernel logs
kernel.printk = 3 3 3 3

# Restrict ptrace scope (prevents process debugging by non-parent processes)
kernel.yama.ptrace_scope = 1

# Restrict kernel module loading
kernel.modules_disabled = 0

# Enable ASLR (Address Space Layout Randomization)
kernel.randomize_va_space = 2

# Restrict core dumps
kernel.core_uses_pid = 1
fs.suid_dumpable = 0

# ============================================
# Filesystem Security
# ============================================

# Restrict access to /proc
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Increase inotify watches (for security monitoring tools)
fs.inotify.max_user_watches = 524288

# ============================================
# Memory Security
# ============================================

# Restrict unprivileged access to kernel syslog
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# Restrict unprivileged user namespaces (prevents container escape attacks)
kernel.unprivileged_userns_clone = 0

# Virtual memory tuning
vm.swappiness = 10
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Protect against memory overcommit attacks
vm.overcommit_memory = 0
vm.overcommit_ratio = 50
