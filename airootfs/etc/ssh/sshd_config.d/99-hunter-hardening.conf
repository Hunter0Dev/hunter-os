# SSH Server Hardening Configuration for HUNTER OS
# /etc/ssh/sshd_config.d/99-hunter-hardening.conf

# Disable root login
PermitRootLogin no

# Disable password authentication (key-based only)
PasswordAuthentication no
PermitEmptyPasswords no
ChallengeResponseAuthentication no

# Use only strong key exchange algorithms
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256

# Use only strong ciphers
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr

# Use only strong MACs
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256

# Disable X11 forwarding
X11Forwarding no

# Disable TCP forwarding
AllowTcpForwarding no
AllowStreamLocalForwarding no
GatewayPorts no

# Disable agent forwarding
AllowAgentForwarding no

# Maximum authentication attempts
MaxAuthTries 3
MaxSessions 2

# Login grace time
LoginGraceTime 30

# Client alive interval (disconnect idle sessions)
ClientAliveInterval 300
ClientAliveCountMax 2

# Use privilege separation
UsePrivilegeSeparation sandbox

# Logging
SyslogFacility AUTH
LogLevel VERBOSE

# Only allow specific users (uncomment and modify as needed)
# AllowUsers hunter admin

# Use PAM
UsePAM yes

# Print last log
PrintLastLog yes

# Strict modes
StrictModes yes

# Host-based authentication
HostbasedAuthentication no
IgnoreRhosts yes
