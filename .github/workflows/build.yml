name: Build HUNTER OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build ISO (Using Docker Script)
      run: |
        chmod +x setup.sh build_with_docker.sh
        ./setup.sh # Ensures Docker is setup (though pre-installed on verified runners)
        sudo ./build_with_docker.sh

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hunter-os-iso
        path: out/*.iso
        retention-days: 5
