name: Build Hunter OS ISO\n\non:\n  push:\n    branches: [ main ]\n  pull_request:\n    branches: [ main ]\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    \n    steps:\n    - name: Checkout code\n      uses: actions/checkout@v4\n      \n    - name: Set up Docker Buildx\n      uses: docker/setup-buildx-action@v3\n      \n    - name: Free up disk space\n      run: |\n        sudo rm -rf /usr/share/dotnet\n        sudo rm -rf /opt/ghc\n        sudo rm -rf "/usr/local/share/boost"\n        sudo rm -rf "$AGENT_TOOLSDIRECTORY"\n        sudo apt-get clean\n        df -h\n        \n    - name: Build Hunter OS ISO\n      run: |\n        chmod +x build_with_docker.sh\n        ./build_with_docker.sh\n        \n    - name: List output files\n      run: |\n        echo "=== Build Complete ==="\n        ls -lh out/ || echo "No out directory found"\n        du -h out/*.iso || echo "No ISO found"\n        \n    - name: Upload ISO as Artifact\n      uses: actions/upload-artifact@v4\n      if: success()\n      with:\n        name: hunter-os-iso-${{ github.run_number }}\n        path: out/*.iso\n        retention-days: 1\n        compression-level: 0\n        \n    - name: Create Release (on tag)\n      if: startsWith(github.ref, 'refs/tags/')\n      uses: softprops/action-gh-release@v1\n      with:\n        files: out/*.iso\n        body: |\n          # Hunter OS Release ${{ github.ref_name }}\n          \n          ## Download\n          Download the ISO below and write it to a USB drive.\n          \n          ## System Requirements\n          - **RAM:** 2GB minimum, 4GB recommended\n          - **Storage:** 20GB minimum\n          - **Architecture:** x86_64 (64-bit)\n          \n          ## Features\n          - Smart hardware detection\n          - Automatic profile selection\n          - 100+ packages included\n          - Security hardening (AppArmor, UFW, Fail2ban)\n      env:\n        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n