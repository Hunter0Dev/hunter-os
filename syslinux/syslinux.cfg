# SYSLINUX Configuration for HUNTER OS (BIOS Boot)

DEFAULT select
TIMEOUT 100

# UI Configuration
UI vesamenu.c32
MENU TITLE HUNTER OS Boot Menu
MENU BACKGROUND splash.png

# Colors (Cyan/Black theme matching HUNTER OS branding)
MENU COLOR screen       37;40      #80ffffff #00000000 std
MENU COLOR border       30;44      #40ffffff #00000000 std
MENU COLOR title        1;36;44    #ff00ffff #00000000 std
MENU COLOR sel          7;37;40    #e0ffffff #20ff8000 all
MENU COLOR unsel        37;44      #50ffffff #00000000 std
MENU COLOR help         37;40      #c0ffffff #00000000 std
MENU COLOR timeout_msg  37;40      #80ffffff #00000000 std
MENU COLOR timeout      1;37;40    #c0ffffff #00000000 std
MENU COLOR msg07        37;40      #90ffffff #00000000 std
MENU COLOR tabmsg       31;40      #30ffffff #00000000 std

LABEL select
    MENU LABEL HUNTER OS (x86_64, BIOS)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS cow_spacesize=1G copytoram=n quiet splash loglevel=3

LABEL copytoram
    MENU LABEL HUNTER OS (x86_64, BIOS) - Copy to RAM
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS cow_spacesize=1G copytoram=y quiet splash

LABEL safe
    MENU LABEL HUNTER OS (x86_64, BIOS) - Safe Mode
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS nomodeset nouveau.modeset=0 i915.modeset=0

LABEL emergency
    MENU LABEL HUNTER OS (x86_64, BIOS) - Emergency Shell
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS systemd.unit=emergency.target

LABEL existing
    MENU LABEL Boot existing OS
    COM32 chain.c32
    APPEND hd0 0

LABEL memtest
    MENU LABEL Memory Test (memtest86+)
    LINUX /%INSTALL_DIR%/boot/memtest86+/memtest.bin

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32
