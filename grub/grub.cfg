# GRUB Configuration for HUNTER OS
# This file is generated during ISO creation

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

insmod all_video
insmod font

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod gfxterm
    set gfxmode="auto"
    terminal_input console
    terminal_output gfxterm
fi

# Theme
insmod gfxmenu
insmod png
set theme="${prefix}/themes/hunter/theme.txt"

# Timeout
set timeout=10
set timeout_style=menu

# Default boot entry
set default="0"

# Menu entries
menuentry "HUNTER OS (x86_64, UEFI)" --class arch --class gnu-linux --class gnu --class os --id 'hunter-os' {
    set gfxpayload=keep
    search --no-floppy --set=root --label HUNTER_OS
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS cow_spacesize=1G copytoram=n quiet splash plymouth.enable=1 loglevel=3 systemd.show_status=auto rd.udev.log_level=3 vt.global_cursor_default=0
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "HUNTER OS (x86_64, UEFI) - Copy to RAM" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    search --no-floppy --set=root --label HUNTER_OS
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS cow_spacesize=1G copytoram=y quiet splash plymouth.enable=1 loglevel=3
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "HUNTER OS (x86_64, UEFI) - Safe Mode (X11)" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    search --no-floppy --set=root --label HUNTER_OS
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS cow_spacesize=1G nomodeset nouveau.modeset=0 i915.modeset=0 radeon.modeset=0
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "HUNTER OS (x86_64, UEFI) - Emergency Shell" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    search --no-floppy --set=root --label HUNTER_OS
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=HUNTER_OS systemd.unit=emergency.target
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

if [ "${grub_platform}" == "efi" ]; then
    if [ "${grub_cpu}" == "x86_64" ]; then
        menuentry "UEFI Shell" {
            insmod chain
            search --no-floppy --set=root --label HUNTER_OS
            chainloader /shellx64.efi
        }
    fi

    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry "System shutdown" --class shutdown --class poweroff {
    echo "System shutting down..."
    halt
}

menuentry "System restart" --class reboot --class restart {
    echo "System restarting..."
    reboot
}
